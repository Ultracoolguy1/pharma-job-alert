name: 기업 코드 수집 (1회만 실행)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 라이브러리 설치
        run: pip install requests beautifulsoup4

      - name: 기업 코드 수집
        run: python collect_codes.py

      - name: company_codes.json 저장
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add company_codes.json
          git diff --staged --quiet || git commit -m "기업 코드 수집 완료"
          git push
