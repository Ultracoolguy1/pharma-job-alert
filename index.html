<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>제약 채용 알리미</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f7; color: #1d1d1f; }

  .layout { display: flex; flex-direction: column; min-height: 100vh; }

  .topbar { height: 52px; padding: 0 16px; border-bottom: 0.5px solid #e0e0e0; display: flex; align-items: center; gap: 12px; background: #fff; position: sticky; top: 0; z-index: 100; }
  .toggle-btn { width: 32px; height: 32px; border: 0.5px solid #e0e0e0; border-radius: 8px; background: #fff; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .page-title { font-size: 15px; font-weight: 500; flex: 1; }
  .fav-tab { font-size: 13px; padding: 5px 12px; border-radius: 999px; border: 0.5px solid #e0e0e0; background: #fff; cursor: pointer; color: #888; }
  .fav-tab.active { background: #fff3e0; border-color: #ffb74d; color: #e65100; }

  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 200; }
  .overlay.open { display: block; }
  .sidebar { position: fixed; top: 0; left: -260px; width: 260px; height: 100%; background: #fff; border-right: 0.5px solid #e0e0e0; display: flex; flex-direction: column; transition: left 0.25s; z-index: 300; }
  .sidebar.open { left: 0; }
  .sidebar-header { height: 52px; padding: 0 16px; border-bottom: 0.5px solid #e0e0e0; display: flex; align-items: center; justify-content: space-between; }
  .sidebar-header-text p { font-size: 14px; font-weight: 500; }
  .sidebar-header-text span { font-size: 11px; color: #888; }
  .close-btn { width: 28px; height: 28px; border: none; background: none; font-size: 18px; cursor: pointer; color: #888; }
  .company-list { overflow-y: auto; flex: 1; -webkit-overflow-scrolling: touch; }
  .company-item { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-bottom: 0.5px solid #f0f0f0; cursor: pointer; }
  .company-item.active { background: #f0f0ff; }
  .company-item.active .company-name { color: #5856d6; font-weight: 500; }
  .company-rank { font-size: 11px; color: #bbb; min-width: 20px; text-align: right; }
  .company-name { font-size: 14px; flex: 1; }

  .search-bar { padding: 10px 16px; display: flex; flex-direction: column; gap: 8px; background: #fff; border-bottom: 0.5px solid #e0e0e0; }
  .search-bar input { width: 100%; height: 38px; border: 0.5px solid #e0e0e0; border-radius: 10px; padding: 0 12px; font-size: 14px; outline: none; background: #f5f5f7; }
  .search-bar input:focus { border-color: #5856d6; background: #fff; }

  .stats-bar { padding: 12px 16px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; background: #f5f5f7; }
  .stat { background: #fff; border-radius: 10px; padding: 10px 12px; }
  .stat-label { font-size: 11px; color: #888; margin-bottom: 4px; }
  .stat-value { font-size: 20px; font-weight: 500; }
  .stat-value.small { font-size: 13px; padding-top: 4px; }

  .content { flex: 1; padding: 12px 16px; }
  .result-info { font-size: 12px; color: #888; margin-bottom: 10px; }

  .job-card { background: #fff; border-radius: 12px; padding: 14px; margin-bottom: 10px; border: 0.5px solid #e8e8e8; position: relative; }
  .job-card.favorited { border-color: #ffb74d; background: #fffdf7; }
  .job-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 6px; }
  .job-title { font-size: 14px; font-weight: 500; flex: 1; padding-right: 10px; line-height: 1.4; }
  .job-badges { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
  .job-company { font-size: 13px; color: #888; margin-bottom: 10px; }
  .job-bottom { display: flex; align-items: center; justify-content: space-between; }

  .badge { font-size: 11px; padding: 2px 8px; border-radius: 6px; white-space: nowrap; }
  .badge-new { background: #e8f5e9; color: #2e7d32; }
  .badge-dday { background: #fff3e0; color: #e65100; }
  .badge-soon { background: #fce4ec; color: #c62828; }
  .badge-normal { background: #f5f5f7; color: #888; }
  .badge-always { background: #f3e5f5; color: #6a1b9a; }
  .badge-closed { background: #ffebee; color: #b71c1c; }

  .platform-badge { font-size: 11px; padding: 3px 8px; border-radius: 6px; }
  .platform-saramin { background: #e3f2fd; color: #1565c0; }
  .platform-jobkorea { background: #fff3e0; color: #e65100; }
  .job-link { font-size: 13px; color: #5856d6; text-decoration: none; }

  .fav-btn { background: none; border: none; font-size: 18px; cursor: pointer; padding: 0; line-height: 1; }

  .empty { text-align: center; padding: 3rem 1rem; font-size: 14px; color: #888; }

  @media (min-width: 768px) {
    .layout { flex-direction: row; height: 100vh; }
    .overlay { display: none !important; }
    .sidebar { position: relative; left: 0 !important; width: 220px; height: 100%; transition: width 0.25s; }
    .sidebar.closed { width: 0; overflow: hidden; }
    .main { flex: 1; min-width: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    .content { overflow-y: auto; flex: 1; }
    .stats-bar { grid-template-columns: repeat(4, 1fr); }
    .close-btn { display: none; }
  }
</style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<div class="layout">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-header-text">
        <p>트래킹 기업</p>
        <span>매출 순위</span>
      </div>
      <button class="close-btn" onclick="closeSidebar()">✕</button>
    </div>
    <div class="company-list" id="company-list"></div>
  </div>

  <div class="main">
    <div class="topbar">
      <button class="toggle-btn" onclick="toggleSidebar()">☰</button>
      <span class="page-title" id="page-title">전체 공고</span>
      <button class="fav-tab" id="fav-tab" onclick="toggleFavMode()">⭐ 즐겨찾기</button>
    </div>

    <div class="search-bar">
      <input type="text" id="search-company" placeholder="🔍 회사명 검색">
      <input type="text" id="search-title" placeholder="🔍 공고명 검색">
    </div>

    <div class="stats-bar">
      <div class="stat"><div class="stat-label">오늘 새 공고</div><div class="stat-value" id="stat-today">0</div></div>
      <div class="stat"><div class="stat-label">누적 공고</div><div class="stat-value" id="stat-total">0</div></div>
      <div class="stat"><div class="stat-label">트래킹 기업</div><div class="stat-value" id="stat-companies">0</div></div>
      <div class="stat"><div class="stat-label">마지막 업데이트</div><div class="stat-value small" id="stat-updated">-</div></div>
    </div>

    <div class="content">
      <div class="result-info" id="result-info"></div>
      <div id="job-list"></div>
    </div>
  </div>
</div>

<script>
const COMPANIES = [
  "유한양행", "GC녹십자", "광동제약", "종근당", "한미약품",
  "대웅제약", "보령", "동아에스티", "JW중외제약", "제일약품", "한독",
  "동화약품", "셀트리온제약", "파마리서치", "HK이노엔", "동국제약",
  "일동제약", "대원제약", "휴온스", "삼일제약", "SK바이오팜",
  "부광약품", "현대약품", "일양약품", "신풍제약", "종근당바이오",
  "한림제약", "씨젠", "휴젤", "메디톡스", "대웅바이오", "동아제약",
  "경동제약", "삼진제약", "영진약품", "안국약품", "명인제약",
  "한국유나이티드제약", "조아제약", "HLB제약", "한국콜마",
  "코오롱제약", "동성제약", "경보제약", "환인제약", "하나제약"
];

let allJobs = [];
let activeCompany = "";
let favMode = false;
let favorites = JSON.parse(localStorage.getItem("pharma_favorites") || "[]");

function saveFavorites() {
  localStorage.setItem("pharma_favorites", JSON.stringify(favorites));
}

function isFavorited(id) {
  return favorites.includes(id);
}

function toggleFavorite(id) {
  if (isFavorited(id)) {
    favorites = favorites.filter(f => f !== id);
  } else {
    favorites.push(id);
  }
  saveFavorites();
  render();
}

function toggleFavMode() {
  favMode = !favMode;
  const tab = document.getElementById("fav-tab");
  tab.classList.toggle("active", favMode);
  document.getElementById("page-title").textContent = favMode ? "⭐ 즐겨찾기" : "전체 공고";
  render();
}

const companyList = document.getElementById("company-list");
COMPANIES.forEach((c, i) => {
  const el = document.createElement("div");
  el.className = "company-item";
  el.id = `co-${i}`;
  el.innerHTML = `<span class="company-rank">${i+1}</span><span class="company-name">${c}</span>`;
  el.onclick = () => selectCompany(c, i);
  companyList.appendChild(el);
});
