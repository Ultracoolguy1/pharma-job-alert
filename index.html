<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>제약 채용 알리미</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f7; color: #1d1d1f; }

  .layout { display: flex; height: 100vh; }

  /* 사이드바 */
  .sidebar { width: 220px; background: #fff; border-right: 0.5px solid #e0e0e0; display: flex; flex-direction:column; transition: width 0.25s; overflow: hidden; flex-shrink: 0; }
  .sidebar.closed { width: 0; }
  .sidebar-header { height: 52px; padding: 0 16px; border-bottom: 0.5px solid #e0e0e0; display: flex; flex-direction: column; justify-content: center; }
  .sidebar-header p { font-size: 13px; font-weight: 500; color: #1d1d1f; }
  .sidebar-header span { font-size: 11px; color: #888; }
  .company-list { overflow-y: auto; flex: 1; }
  .company-item { display: flex; align-items: center; gap: 10px; padding: 9px 16px; border-bottom: 0.5px solid #f0f0f0; cursor: pointer; transition: background 0.15s; }
  .company-item:hover { background: #f5f5f7; }
  .company-item.active { background: #f0f0ff; }
  .company-item.active .company-name { color: #5856d6; font-weight: 500; }
  .company-rank { font-size: 11px; color: #bbb; min-width: 18px; text-align: right; }
  .company-name { font-size: 13px; color: #1d1d1f; white-space: nowrap; }

  /* 메인 */
  .main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  .topbar { height: 52px; padding: 0 16px; border-bottom: 0.5px solid #e0e0e0; display: flex; align-items: center; gap: 12px; background: #fff; }
  .toggle-btn { width: 32px; height: 32px; border: 0.5px solid #e0e0e0; border-radius: 8px; background: #fff; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .toggle-btn:hover { background: #f5f5f7; }
  .page-title { font-size: 15px; font-weight: 500; }

  .search-bar { padding: 12px 16px; border-bottom: 0.5px solid #e0e0e0; display: flex; gap: 8px; background: #fff; }
  .search-bar input { flex: 1; height: 36px; border: 0.5px solid #e0e0e0; border-radius: 8px; padding: 0 12px; font-size: 13px; outline: none; }
  .search-bar input:focus { border-color: #5856d6; }

  .stats-bar { padding: 12px 16px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; border-bottom: 0.5px solid #e0e0e0; background: #fff; }
  .stat { background: #f5f5f7; border-radius: 8px; padding: 10px 12px; }
  .stat-label { font-size: 11px; color: #888; margin-bottom: 4px; }
  .stat-value { font-size: 20px; font-weight: 500; }

  .content { flex: 1; overflow-y: auto; padding: 16px; }
  .result-info { font-size: 12px; color: #888; margin-bottom: 12px; }

  .job-card { background: #fff; border: 0.5px solid #e0e0e0; border-radius: 12px; padding: 14px; margin-bottom: 10px; transition: box-shadow 0.15s; }
  .job-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .job-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 6px; }
  .job-title { font-size: 14px; font-weight: 500; flex: 1; padding-right: 10px; line-height: 1.4; }
  .badge-new { font-size: 11px; padding: 2px 8px; border-radius: 6px; background: #e8f5e9; color: #2e7d32; white-space: nowrap; }
  .badge-date { font-size: 11px; padding: 2px 8px; border-radius: 6px; background: #f5f5f7; color: #888; white-space: nowrap; }
  .job-company { font-size: 12px; color: #888; margin-bottom: 10px; }
  .job-bottom { display: flex; align-items: center; justify-content: space-between; }
  .platform-badge { font-size: 11px; padding: 2px 8px; border-radius: 6px; }
  .platform-saramin { background: #e3f2fd; color: #1565c0; }
  .platform-jobkorea { background: #fff3e0; color: #e65100; }
  .job-link { font-size: 12px; color: #5856d6; text-decoration: none; }
  .job-link:hover { text-decoration: underline; }

  .empty { text-align: center; padding: 3rem; font-size: 14px; color: #888; }
</style>
</head>
<body>

<div class="layout">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <p>트래킹 기업</p>
      <span>매출 순위</span>
    </div>
    <div class="company-list" id="company-list"></div>
  </div>

  <div class="main">
    <div class="topbar">
      <button class="toggle-btn" onclick="toggleSidebar()">☰</button>
      <span class="page-title" id="page-title">전체 공고</span>
    </div>

    <div class="search-bar">
      <input type="text" id="search-company" placeholder="회사명 검색">
      <input type="text" id="search-title" placeholder="공고명 검색">
    </div>

    <div class="stats-bar">
      <div class="stat"><div class="stat-label">오늘 새 공고</div><div class="stat-value" id="stat-today">0</div></div>
      <div class="stat"><div class="stat-label">누적 공고</div><div class="stat-value" id="stat-total">0</div></div>
      <div class="stat"><div class="stat-label">트래킹 기업</div><div class="stat-value" id="stat-companies">0</div></div>
      <div class="stat"><div class="stat-label">마지막 업데이트</div><div class="stat-value" style="font-size:13px;" id="stat-updated">-</div></div>
    </div>

    <div class="content">
      <div class="result-info" id="result-info"></div>
      <div id="job-list"></div>
    </div>
  </div>
</div>

<script>

  "JW중외제약","제일약품","한독","동화약품","셀트리온제약",

  "한올바이오파마","부광약품","현대약품","일양약품","신풍제약",
  "종근당바이오","한림제약","동구바이오제약","JW생명과학",
  "씨젠","휴젤","메디톡스","대웅바이오","동아제약",
  "경동제약","삼진제약","영진약품","안국약품","명인제약",
  "한국유나이티드제약","조아제약","에이치엘비제약","HLB제약","한국콜마",
  "코오롱제약","동성제약","태준제약"
];

let allJobs = [];
let activeCompany = "";
let sidebarOpen = true;
const today = new Date().toLocaleDateString("ko-KR", {year:"numeric",month:"2-digit",day:"2-digit"}).replace(/\./g,"").replace(/ /g,".");

// 사이드바 회사 목록 렌더링
const companyList = document.getElementById("company-list");
COMPANIES.forEach((c, i) => {
  const el = document.createElement("div");
  el.className = "company-item";
  el.id = `co-${i}`;
  el.innerHTML = `<span class="company-rank">${i+1}</span><span class="company-name">${c}</span>`;
  el.onclick = () => selectCompany(c, i);
  companyList.appendChild(el);
});

function selectCompany(name, idx) {
  activeCompany = name;
  document.getElementById("page-title").textContent = name;
  document.getElementById("search-company").value = "";
  document.querySelectorAll(".company-item").forEach(el => el.classList.remove("active"));
  document.getElementById(`co-${idx}`).classList.add("active");
  render();
}

function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  document.getElementById("sidebar").classList.toggle("closed", !sidebarOpen);
}

function isToday(dateStr) {
  const now = new Date();
  const d = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,"0")}.${String(now.getDate()).padStart(2,"0")}`;
  return dateStr === d;
}

  const titleQ = document.getElementById("search-title").value.trim().toLowerCase();
